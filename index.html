<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал кузнечных работ</title>

        * {

            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('image_a672c2ab-b630-4d28-8731-6bdb503e3de8.png');

            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #ffffff;
            margin: 0;
            padding: 20px 12px;
            min-height: 100vh;
        }

        /* Основной контейнер стал полупрозрачным, чтобы проглядывал фон цеха */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.55); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 24px;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            border-bottom: 3px solid #2ecc71;
            padding-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            padding: 12px 16px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.6);
        }

        /* Кнопки управления */
        .btn {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            text-align: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        .btn-add { background-color: #2ecc71; }
        .btn-add:hover { background-color: #27ae60; }
        .btn-export { background-color: rgba(51, 65, 85, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        .btn-export:hover { background-color: #475569; }
        .btn-import { background-color: rgba(139, 92, 246, 0.8); }
        .btn-import:hover { background-color: #7c3aed; }
        
        .btn-edit { background-color: #3b82f6; padding: 8px 12px; font-size: 14px; border-radius: 6px; }
        .btn-edit:hover { background-color: #2563eb; }
        .btn-delete { background-color: #ef4444; padding: 8px 12px; font-size: 14px; border-radius: 6px; }
        .btn-delete:hover { background-color: #dc2626; }
        .btn-save { background-color: #2ecc71; width: 100%; font-size: 16px; padding: 14px; justify-content: center; }
        .btn-cancel { background-color: #64748b; }
        .btn-extra { background-color: #f97316; font-size: 14px; padding: 10px 12px; margin-top: 8px; width: 100%; justify-content: center; }

        /* Подложка таблицы прозрачная */
        .table-wrapper { 
            overflow-x: auto; 
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            background: rgba(15, 23, 42, 0.35); 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
        }

        th, td { 
            text-align: left; 
            padding: 12px 12px; 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            font-size: 14px; 
            vertical-align: middle; 
        }

        th { 
            background-color: rgba(15, 23, 42, 0.75); 
            color: #2ecc71; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tr:hover { 
            background-color: rgba(255, 255, 255, 0.08); 
        }
        
        .sub-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            min-height: 38px;
            align-items: center;
        }
        .sub-row:last-child {
            border-bottom: none;
        }
        .sub-cell {
            flex: 1;
        }
        .sub-cell.diameter { font-weight: 700; color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.6); }
        .sub-cell.temp { font-weight: 700; color: #ff9f43; text-shadow: 0 1px 5px rgba(0,0,0,0.8); } 
        .sub-cell.holding { color: #e2e8f0; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .sub-cell.note { font-weight: 500; color: #cbd5e1; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }

        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 10px;
        }
        .modal {
            background: #0f172a;
            color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2ecc71;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #94a3b8; }
        .input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .input-icon { position: absolute; left: 10px; font-weight: bold; color: #64748b; font-size: 16px; }
        
        .form-control { 
            width: 100%; 
            padding: 10px 12px; 
            background: #1e293b;
            color: #ffffff;
            border: 1px solid #475569; 
            border-radius: 6px; 
            font-size: 14px; 
            outline: none; 
        }
        .form-control:focus { border-color: #2ecc71; }
        .form-control.has-icon { padding-left: 28px; }
        
        .param-block { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px; border: 1px dashed #475569; margin-bottom: 12px; position: relative; }
        .param-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .btn-remove-block { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .no-results { display: none; text-align: center; padding: 30px; color: #94a3b8; font-weight: bold; font-size: 16px; }
        .actions-cell { display: flex; gap: 6px; justify-content: center; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 Технологические параметры ковки </h1>
    
    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Поиск по марке, размеру, температуре или примечанию..." autocomplete="off">
        <button class="btn btn-add" onclick="openAddModal()">➕ Добавить строку</button>
        <button class="btn btn-export" onclick="exportDatabase()">💾 Скачать базу</button>
        <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">📂 Загрузить базу</button>
        
        <input type="file" id="fileInput" onchange="importDatabase(event)">
    </div>

    <div class="table-wrapper">
        <table id="forgeTable">
            <thead>
                <tr>
                    <th style="width: 4%; text-align: center;">№</th>
                    <th style="width: 22%">Марка металла</th>
                    <th style="width: 26%">Диаметр заготовки</th>
                    <th style="width: 18%">Температура ковки</th>
                    <th style="width: 14%">Выдержка</th>
                    <th style="width: 11%">Примечание</th>
                    <th style="width: 5%; text-align: center;">Действия</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
    
    <div id="noResults" class="no-results">Совпадений не найдено</div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header" id="modalTitle">Редактирование параметров</div>
        <input type="hidden" id="editRowIndex">
        
        <div class="form-group">
            <label for="metalBrand">Марка металла</label>
            <input type="text" id="metalBrand" class="form-control" placeholder="Например: ХН70ВМТЮ, ЭИ961">
        </div>

        <div class="form-group">
            <label>Параметры обработки для каждого размера</label>
            <div id="paramsContainer"></div>
            <button type="button" class="btn btn-extra" onclick="addParamBlock('', '', '—', '—')">➕ Добавить диаметр и режимы</button>
        </div>
        
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
            <button class="btn btn-save" onclick="saveData()">Сохранить</button>
        </div>
    </div>
</div>

      { "brand": "ЭП742", "modes": [{ "diameter": "120", "temp": "1140 °C", "holding": "—", "twoEnds": "на 2 конца" }] },
      { "brand": "ЭП817", "modes": [{ "diameter": "110, 95", "temp": "1150 °C", "holding": "—", "twoEnds": "—" }, { "diameter": "70", "temp": "1120 °C", "holding": "—", "twoEnds": "—" }] },
      { "brand": "ЭП914", "modes": [{ "diameter": "110", "temp": "1160 °C", "holding": "—", "twoEnds": "на 2 конца" }] },
      { "brand": "ЭП962", "modes": [{ "diameter": "140", "temp": "1160 °C", "holding": "—", "twoEnds": "на 2 конца" }, { "diameter": "115", "temp": "1150 °C", "holding": "—", "twoEnds": "на 2 конца" }] },
      { "brand": "ЭП975", "modes": [{ "diameter": "110", "temp": "1160 °C", "holding": "—", "twoEnds": "на 2 конца" }] }

    let currentData = JSON.parse(localStorage.getItem('forgePerfectSyncDB')) || defaultData;

    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const modalOverlay = document.getElementById('modalOverlay');
    const noResults = document.getElementById('noResults');
    const paramsContainer = document.getElementById('paramsContainer');

    function renderTable() {
        tableBody.innerHTML = '';
        currentData.sort((a, b) => a.brand.localeCompare(b.brand));

        currentData.forEach((row, index) => {
            const tr = document.createElement('tr');
            
            let diametersHTML = '';
            let tempsHTML = '';
            let holdingsHTML = '';
            let notesHTML = '';
            
            row.modes.forEach(mode => {
                const hasArrow = mode.diameter.includes('➔') || mode.diameter.includes('—');
                const displayDiam = (mode.diameter && mode.diameter !== '—' && !hasArrow) ? `⌀ ${mode.diameter}` : mode.diameter;
                
                diametersHTML += `<div class="sub-row"><div class="sub-cell diameter">${displayDiam}</div></div>`;
                tempsHTML += `<div class="sub-row"><div class="sub-cell temp">${mode.temp}</div></div>`;
                holdingsHTML += `<div class="sub-row"><div class="sub-cell holding">${mode.holding}</div></div>`;
                notesHTML += `<div class="sub-row"><div class="sub-cell note">${mode.twoEnds}</div></div>`;
            });

            tr.innerHTML = `
                <td style="color: #cbd5e1; font-weight: bold; text-align: center;">${index + 1}</td>
                <td style="font-weight: 600; color: #ffffff; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">${row.brand}</td>
                <td style="padding: 0;">${diametersHTML}</td>
                <td style="padding: 0;">${tempsHTML}</td>
                <td style="padding: 0;">${holdingsHTML}</td>
                <td style="padding: 0;">${notesHTML}</td>
                <td class="actions-cell">
                    <button class="btn btn-edit" onclick="openEditModal(${index})">📝</button>
                    <button class="btn btn-delete" onclick="deleteEntry(${index})">✕</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });
        localStorage.setItem('forgePerfectSyncDB', JSON.stringify(currentData));
    }

    window.exportDatabase = function() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentData, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "forge_unified_base.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    };

    window.importDatabase = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if (confirm('Вы уверены, что хотите полностью перезаписать текущую таблицу загруженными данными?')) {
                        
                        // ПРОВЕРКА ФОРМАТА: Если загружается старый файл (имеет mark вместо brand)
                        if (imported.length > 0 && imported[0].hasOwnProperty('mark')) {
                            
                            currentData = imported.map(item => {
                                const modes = [];
                                const parts = item.temp ? item.temp.split('/') : ['—'];
                                
                                parts.forEach(part => {
                                    let cleanPart = part.trim();
                                    let diameter = '—';
                                    let temp = '—';
                                    
                                    if (cleanPart.includes('(t=')) {
                                        const tMatch = cleanPart.match(/\(t=([^)]+)\)/);
                                        if (tMatch) temp = tMatch[1].trim();
                                        diameter = cleanPart.replace(/\(t=[^)]+\)/, '').replace(/⌀/g, '').trim();
                                    } 
                                    else if (cleanPart.includes('—')) {
                                        const subParts = cleanPart.split('—');
                                        diameter = subParts[0].replace(/⌀/g, '').trim();
                                        temp = subParts[1].trim();
                                    } 
                                    else {
                                        diameter = cleanPart.replace(/⌀/g, '').trim();
                                    }
                                    
                                    modes.push({
                                        diameter: diameter || '—',
                                        temp: temp || '—',
                                        holding: item.hold || '—',
                                        twoEnds: (item.note && item.note.trim()) ? item.note.trim() : '—'
                                    });
                                });

                                return {
                                    brand: item.mark,
                                    modes: modes
                                };
                            });
                            
                        } else {
                            // Если файл уже нового, правильного формата
                            currentData = imported;
                        }

                        renderTable();
                        filterTable();
                    }
                } else {
                    alert('Неверный формат файла! Проверьте структуру .json');
                }
            } catch (err) {
                alert('Ошибка при чтении файла!');
                console.error(err);
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    };

    window.addParamBlock = function(diam = '', temp = '', hold = '—', note = '—') {
        const div = document.createElement('div');
        div.className = 'param-block';
        
        const noteSelectHTML = `
            <select class="form-control block-note">
                <option value="—" ${note === '—' ? 'selected' : ''}>—</option>
                <option value="на 2 конца" ${note === 'на 2 конца' ? 'selected' : ''}>на 2 конца</option>
            </select>
        `;

        div.innerHTML = `
            <button type="button" class="btn-remove-block" onclick="removeParamBlock(this)">✕</button>
            <div class="param-grid">
                <div>
                    <label>Диаметр</label>
                    <div class="input-wrapper">
                        <span class="input-icon">⌀</span>
                        <input type="text" class="form-control has-icon block-diameter" placeholder="Напр: 140" value="${diam}">
                    </div>
                </div>
                <div>
                    <label>Температура</label>
                    <input type="text" class="form-control block-temperature" placeholder="Напр: 1180" value="${temp}">
                </div>
            </div>
            <div class="param-grid">
                <div>
                    <label>Выдержка</label>
                    <input type="text" class="form-control block-holding" placeholder="Напр: 20 мин." value="${hold}">
                </div>
                <div>
                    <label>Примечание</label>
                    ${noteSelectHTML}
                </div>
            </div>
        `;
        paramsContainer.appendChild(div);
    };

    window.removeParamBlock = function(btn) {
        if (paramsContainer.querySelectorAll('.param-block').length > 1) {
            btn.parentElement.remove();
        } else {
            alert('У марки должен быть хотя бы один режим!');
        }
    };

    window.openEditModal = function(index) {
        const row = currentData[index];
        document.getElementById('modalTitle').innerText = "📝 Редактирование режимов ковки";
        document.getElementById('editRowIndex').value = index;
        document.getElementById('metalBrand').value = row.brand;
        
        paramsContainer.innerHTML = '';
        row.modes.forEach(mode => {
            const cleanTemp = mode.temp.replace(' °C', '');
            addParamBlock(mode.diameter, cleanTemp, mode.holding, mode.twoEnds);
        });
        
        modalOverlay.style.display = 'flex';
    };

    window.openAddModal = function() {
        document.getElementById('modalTitle').innerText = "➕ Добавить новую марку";
        document.getElementById('editRowIndex').value = '-1';
        document.getElementById('metalBrand').value = '';
        
        paramsContainer.innerHTML = ''; 
        addParamBlock('', '', '—', '—'); 
        modalOverlay.style.display = 'flex';
    };

    window.closeModal = function() {
        modalOverlay.style.display = 'none';
    };

    window.saveData = function() {
        const index = parseInt(document.getElementById('editRowIndex').value);
        const brand = document.getElementById('metalBrand').value.trim();

        if (!brand) {
            alert('Пожалуйста, укажите марку металла!');
            return;
        }

        const blockElements = paramsContainer.querySelectorAll('.param-block');
        const modes = [];

        blockElements.forEach(el => {
            const diameter = el.querySelector('.block-diameter').value.trim() || '—';
            let temp = el.querySelector('.block-temperature').value.trim();
            const holding = el.querySelector('.block-holding').value.trim() || '—';
            const twoEnds = el.querySelector('.block-note').value;
            
            if (temp && !temp.includes('°C') && !temp.includes('интервал')) {
                temp = `${temp} °C`;
            } else if (!temp) {
                temp = '—';
            }
            modes.push({ diameter, temp, holding, twoEnds });
        });

        const rowData = { brand, modes };

        if (index === -1) {
            currentData.push(rowData);
        } else {
            currentData[index] = rowData;
        }

        renderTable();
        closeModal();
        filterTable();
    };

    window.deleteEntry = function(index) {
        if (confirm(`Удалить марку ${currentData[index].brand}?`)) {
            currentData.splice(index, 1);
            renderTable();
            filterTable();
        }
    };

    function filterTable() {
        const query = searchInput.value.toLowerCase().trim();
        const rows = tableBody.querySelectorAll('tr');
        let visibleCount = 0;

        rows.forEach((row) => {
            const text = row.textContent.toLowerCase();
            if (text.includes(query)) {
                row.style.display = '';
                visibleCount++;
                row.querySelector('td').textContent = visibleCount;
            } else {
                row.style.display = 'none';
            }
        });

        noResults.style.display = visibleCount > 0 ? 'none' : 'block';
    }

    modalOverlay.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    searchInput.addEventListener('input', filterTable);
    renderTable();
</script>
